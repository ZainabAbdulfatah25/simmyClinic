<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Soft Glows -->
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#E2ECF5" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#b6c3c9" stop-opacity="0" />
    </radialGradient>

    <!-- Clinic Gradients -->
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2C5D88" />
      <stop offset="100%" stop-color="#182B49" />
    </linearGradient>

    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E2ECF5" />
      <stop offset="100%" stop-color="#2C5D88" />
    </linearGradient>

    <linearGradient id="metallic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="50%" stop-color="#E2ECF5" />
      <stop offset="100%" stop-color="#94A3B8" />
    </linearGradient>

    <!-- Avatar Gradients -->
    <linearGradient id="maternalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDA4AF" />
      <stop offset="100%" stop-color="#F43F5E" />
    </linearGradient>
    <linearGradient id="pediatricGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#86EFAC" />
      <stop offset="100%" stop-color="#22C55E" />
    </linearGradient>
    <linearGradient id="adultGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93C5FD" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="generalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C084FC" />
      <stop offset="100%" stop-color="#A855F7" />
    </linearGradient>

    <!-- Drop Shadows -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="8" stdDeviation="6" flood-color="#182B49" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- 1. Ambient Background Glow -->
  <circle cx="250" cy="250" r="220" fill="url(#bgGlow)" />

  <!-- 2. Medical Tech Circular Rings -->
  <circle cx="250" cy="250" r="180" fill="none" stroke="#2C5D88" stroke-width="1" stroke-opacity="0.15" stroke-dasharray="8 4" />
  <circle cx="250" cy="250" r="140" fill="none" stroke="#182B49" stroke-width="1.5" stroke-opacity="0.1" />

  <!-- 3. CENTRAL TABLET DEVICE (Dashboard View) -->
  <g filter="url(#shadow)">
    <!-- Device Body -->
    <rect x="110" y="80" width="280" height="340" rx="20" fill="#FFFFFF" stroke="rgba(255,255,255,0.9)" stroke-width="2" />
    <!-- Device Screen -->
    <rect x="120" y="90" width="260" height="320" rx="12" fill="#F8FAFC" />
    
    <!-- Screen Header (Portal Interface) -->
    <rect x="120" y="90" width="260" height="42" rx="12" fill="url(#primaryGrad)" />
    <!-- Round Screen Notch Corner Cutoff Cover -->
    <rect x="120" y="100" width="260" height="15" fill="url(#primaryGrad)" />
    
    <!-- Portal Header Content -->
    <circle cx="140" cy="110" r="3.5" fill="#4ADE80" /> <!-- Status Green -->
    <text x="150" y="114" fill="#E2ECF5" font-family="'Outfit', sans-serif" font-size="10" font-weight="600" letter-spacing="0.5">SimmyCare Telehealth Console</text>
    <rect x="330" y="102" width="38" height="16" rx="8" fill="rgba(255,255,255,0.15)" />
    <text x="349" y="113" fill="#FFFFFF" font-family="'Inter', sans-serif" font-size="8" font-weight="600" text-anchor="middle">v2.1</text>

    <!-- Title / Headline -->
    <text x="250" y="152" fill="#182B49" font-family="'Outfit', sans-serif" font-size="12" font-weight="700" text-anchor="middle">Everyday Health for Everyone</text>
    <text x="250" y="162" fill="#64748B" font-family="'Inter', sans-serif" font-size="7" font-weight="500" text-anchor="middle">Multi-Specialty Care Directory &amp; Booking</text>

    <!-- 2x2 Clinic Specialties Grid (No detailed faces, clean avatars) -->
    
    <!-- Card 1: Maternal Care (Pregnant Woman) -->
    <rect x="130" y="176" width="112" height="78" rx="8" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1" />
    <!-- Avatar Circle -->
    <circle cx="156" cy="210" r="16" fill="url(#maternalGrad)" />
    <!-- Pregnant Woman Silhouette Profile -->
    <circle cx="156" cy="202" r="3.5" fill="#FFFFFF" />
    <path d="M 153 207 C 151 209, 150 213, 151 216 C 152 219, 156 222, 156 224 L 153 226 L 157 226 C 160 223, 160 219, 158 216 C 156 214, 156 211, 156 207 Z" fill="#FFFFFF" />
    <path d="M 152 201 C 149 201, 149 205, 151 205 Z" fill="#FFFFFF" />
    <!-- Labels -->
    <text x="178" y="206" fill="#182B49" font-family="'Outfit', sans-serif" font-size="8" font-weight="700">Maternal Care</text>
    <text x="178" y="214" fill="#E11D48" font-family="'Inter', sans-serif" font-size="6" font-weight="600">Gynaecology</text>
    <rect x="178" y="220" width="28" height="8" rx="3" fill="#FFE4E6" />
    <text x="192" y="226" fill="#E11D48" font-family="'Inter', sans-serif" font-size="5.5" font-weight="700" text-anchor="middle">ACTIVE</text>

    <!-- Card 2: Pediatrics (Child Care) -->
    <rect x="258" y="176" width="112" height="78" rx="8" fill="#F0FDF4" stroke="#BBF7D0" stroke-width="1" />
    <circle cx="284" cy="210" r="16" fill="url(#pediatricGrad)" />
    <!-- Child Silhouette Profile -->
    <circle cx="284" cy="203" r="3.2" fill="#FFFFFF" />
    <path d="M 284 207.5 C 280 210, 278 213, 278 222 L 290 222 C 290 213, 288 210, 284 207.5 Z" fill="#FFFFFF" />
    <!-- Labels -->
    <text x="306" y="206" fill="#182B49" font-family="'Outfit', sans-serif" font-size="8" font-weight="700">Child Care</text>
    <text x="306" y="214" fill="#16A34A" font-family="'Inter', sans-serif" font-size="6" font-weight="600">Pediatrics</text>
    <rect x="306" y="220" width="28" height="8" rx="3" fill="#DCFCE7" />
    <text x="320" y="226" fill="#16A34A" font-family="'Inter', sans-serif" font-size="5.5" font-weight="700" text-anchor="middle">ACTIVE</text>

    <!-- Card 3: Adult Care (Senior/Mature) -->
    <rect x="130" y="264" width="112" height="78" rx="8" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1" />
    <circle cx="156" cy="298" r="16" fill="url(#adultGrad)" />
    <!-- Senior/Adult Silhouette Profile (e.g. with simple glasses outline) -->
    <circle cx="156" cy="290" r="3.6" fill="#FFFFFF" />
    <path d="M 156 295 C 151 297.5, 149 301, 149 310 L 163 310 C 163 301, 161 297.5, 156 295 Z" fill="#FFFFFF" />
    <rect x="151.5" y="289" width="9" height="2" rx="0.5" fill="#2563EB" opacity="0.8" />
    <!-- Labels -->
    <text x="178" y="294" fill="#182B49" font-family="'Outfit', sans-serif" font-size="8" font-weight="700">Adult Clinic</text>
    <text x="178" y="302" fill="#2563EB" font-family="'Inter', sans-serif" font-size="6" font-weight="600">Senior Care</text>
    <rect x="178" y="308" width="28" height="8" rx="3" fill="#DBEAFE" />
    <text x="192" y="314" fill="#2563EB" font-family="'Inter', sans-serif" font-size="5.5" font-weight="700" text-anchor="middle">ACTIVE</text>

    <!-- Card 4: General Care (Normal Person) -->
    <rect x="258" y="264" width="112" height="78" rx="8" fill="#FDF4FF" stroke="#F5D0FE" stroke-width="1" />
    <circle cx="284" cy="298" r="16" fill="url(#generalGrad)" />
    <!-- Normal Person/Adult Silhouette Profile -->
    <circle cx="284" cy="290.5" r="3.5" fill="#FFFFFF" />
    <path d="M 284 295 C 279 297, 277.5 301, 277.5 310 L 290.5 310 C 290.5 301, 289 297, 284 295 Z" fill="#FFFFFF" />
    <!-- Labels -->
    <text x="306" y="294" fill="#182B49" font-family="'Outfit', sans-serif" font-size="8" font-weight="700">General Pool</text>
    <text x="306" y="302" fill="#9333EA" font-family="'Inter', sans-serif" font-size="6" font-weight="600">Family Health</text>
    <rect x="306" y="308" width="28" height="8" rx="3" fill="#F3E8FF" />
    <text x="320" y="314" fill="#9333EA" font-family="'Inter', sans-serif" font-size="5.5" font-weight="700" text-anchor="middle">ACTIVE</text>

    <!-- Bottom Action Ribbon -->
    <rect x="132" y="358" width="236" height="36" rx="8" fill="url(#accentGrad)" opacity="0.95" />
    <text x="250" y="380" fill="#FFFFFF" font-family="'Outfit', sans-serif" font-size="10" font-weight="700" text-anchor="middle" letter-spacing="0.5">LAUNCH DIGITAL PORTAL</text>
  </g>

  <!-- 4. REALISTIC STETHOSCOPE GRAPHIC (Curves behind/around tablet) -->
  <!-- Ear Tips / Metal Tubes (Top-Left Backdrop) -->
  <g stroke="#64748B" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
    <path d="M 120 70 C 115 50, 140 40, 150 65 L 150 90" />
    <path d="M 190 70 C 195 50, 170 40, 160 65 L 160 90" />
    <rect x="148" y="58" width="4" height="6" rx="2" fill="#1E293B" stroke="none" />
    <rect x="158" y="58" width="4" height="6" rx="2" fill="#1E293B" stroke="none" />
  </g>

  <!-- Flexible Black Stethoscope Cord (Curves weaving around) -->
  <path d="M 155 90 
           C 155 140, 80 180, 80 280 
           C 80 370, 200 450, 290 450 
           C 390 450, 420 380, 420 320" 
        fill="none" stroke="#1E293B" stroke-width="6.5" stroke-linecap="round" />
  
  <path d="M 155 90 
           C 155 140, 80 180, 80 280 
           C 80 370, 200 450, 290 450 
           C 390 450, 420 380, 420 320" 
        fill="none" stroke="#475569" stroke-width="2.5" stroke-linecap="round" opacity="0.4" />

  <!-- Stethoscope Chestpiece (Resting on the right of the tablet) -->
  <g filter="url(#shadow)" transform="translate(420, 320)">
    <!-- Base Metal Ring -->
    <circle cx="0" cy="0" r="32" fill="url(#metallic)" stroke="#64748B" stroke-width="1" />
    <!-- Secondary Inner Ring -->
    <circle cx="0" cy="0" r="26" fill="url(#primaryGrad)" />
    <!-- Inner Metallic Core -->
    <circle cx="0" cy="0" r="18" fill="url(#metallic)" opacity="0.9" />
    
    <!-- Medical Cross inside Stethoscope diaphragm (Representing Clinic for everyone) -->
    <path d="M -8 -2.5 L -2.5 -2.5 L -2.5 -8 L 2.5 -8 L 2.5 -2.5 L 8 -2.5 L 8 2.5 L 2.5 2.5 L 2.5 8 L -2.5 8 L -2.5 2.5 L -8 2.5 Z" fill="#FFFFFF" stroke="none" />
    
    <!-- Plastic Cord Connector joint -->
    <rect x="-6" y="-36" width="12" height="10" rx="2" fill="#1E293B" />
  </g>

  <!-- Subtle Medical Cross sparkles floating around -->
  <g opacity="0.6">
    <!-- Top Left cross -->
    <path d="M 60 130 L 70 130 M 65 125 L 65 135" stroke="#2C5D88" stroke-width="2" stroke-linecap="round" />
    <!-- Bottom Right cross -->
    <path d="M 400 240 L 412 240 M 406 234 L 406 246" stroke="#2C5D88" stroke-width="2" stroke-linecap="round" />
  </g>
</svg>
