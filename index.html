<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon / Visual Assets -->

<body>

  <!-- Global Background Particles Backdrop (Static SVG animation wrapper) -->

        <circle cx="300" cy="520" r="6" class="orbit-node-glow node-color-3" />
      </g>
      <g class="orbit-group-inner">
        <circle cx="300" cy="300" r="150" fill="none" class="orbit-ring-inner" stroke-width="0.75" />
        <circle cx="450" cy="300" r="4" class="orbit-node-glow node-color-2" />
        <circle cx="150" cy="300" r="5" class="orbit-node-glow node-color-4" />
      </g>
    </svg>
    <svg class="bg-orbit-svg orbit-bottom-right" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
      <g class="orbit-group-outer">
        <circle cx="300" cy="300" r="220" fill="none" class="orbit-ring-outer" stroke-width="1" />
        <circle cx="300" cy="80" r="6" class="orbit-node-glow node-color-2" />
        <circle cx="300" cy="520" r="5" class="orbit-node-glow node-color-4" />
      </g>
      <g class="orbit-group-inner">
        <circle cx="300" cy="300" r="150" fill="none" class="orbit-ring-inner" stroke-width="0.75" />
        <circle cx="450" cy="300" r="4" class="orbit-node-glow node-color-1" />
        <circle cx="150" cy="300" r="6" class="orbit-node-glow node-color-3" />
      </g>
    </svg>
  </div>

  <!-- React root mount element -->
  <div id="root"></div>

  <!-- Vite entry module -->
  <script type="module" src="/src/main.jsx"></script>

</body>

</html>
